<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Horizen News</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
  --bg:#070b12;
  --card:#0e131b;
  --card2:#151b25;
  --border:#1e2635;
  --text:#e5e7eb;
  --muted:#6b7280;
  --accent:#00eb84;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* HEADER */

header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid var(--border);
  background:rgba(7,11,18,.96);
  backdrop-filter:blur(18px);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:24px;
  font-weight:800;
  color:var(--accent);
  letter-spacing:-1px;
}

.logo span{
  color:white;
  font-weight:300;
}

.header-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.search{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 14px;
}

.search input{
  background:none;
  border:none;
  outline:none;
  color:white;
  width:150px;
  font-family:'Inter',sans-serif;
}

.search i{
  color:var(--muted);
}

.refresh-btn{
  border:none;
  background:rgba(0,235,132,.12);
  color:var(--accent);
  border:1px solid rgba(0,235,132,.2);
  padding:8px 14px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
}

/* TABS */

.tabs-wrap{
  overflow-x:auto;
  border-bottom:1px solid var(--border);
  background:var(--card);
  position:sticky;
  top:60px;
  z-index:99;
}

.tabs-wrap::-webkit-scrollbar{
  display:none;
}

.tabs{
  display:flex;
  white-space:nowrap;
  padding:0 10px;
}

.tab{
  padding:14px 16px;
  cursor:pointer;
  color:var(--muted);
  border-bottom:2px solid transparent;
  transition:.2s;
  font-size:13px;
}

.tab:hover{
  color:white;
}

.tab.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}

/* CONTENT */

.container{
  max-width:1300px;
  margin:auto;
  padding:24px 18px;
}

.loader{
  padding:100px;
  text-align:center;
  color:var(--muted);
}

.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.thumb{
  height:180px;
  position:relative;
  overflow:hidden;
  background:var(--card2);
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.3s;
}

.card:hover img{
  transform:scale(1.05);
}

.play-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.3);
  display:flex;
  align-items:center;
  justify-content:center;
}

.play-circle{
  width:54px;
  height:54px;
  border-radius:50%;
  background:rgba(0,235,132,.95);
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.badge{
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(239,68,68,.95);
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:10px;
  font-weight:700;
}

.card-body{
  padding:14px;
}

.source{
  color:var(--accent);
  font-size:10px;
  font-weight:700;
  margin-bottom:8px;
  text-transform:uppercase;
}

.title{
  font-size:14px;
  line-height:1.5;
  font-weight:600;
  min-height:64px;
}

.meta{
  margin-top:12px;
  color:var(--muted);
  font-size:12px;
}

/* PLAYER */

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

#overlay.show{
  display:flex;
}

#player{
  width:100%;
  max-width:920px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
}

#player-top{
  height:60px;
  padding:0 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--card2);
}

#player-source{
  color:var(--accent);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
}

#close{
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--muted);
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.video-wrap{
  position:relative;
  padding-top:56.25%;
  background:black;
}

.video-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.player-body{
  padding:24px;
}

#player-title{
  font-size:20px;
  font-weight:700;
  line-height:1.4;
}

#player-meta{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

#player-desc{
  margin-top:16px;
  color:#90a0b8;
  line-height:1.7;
  max-height:120px;
  overflow-y:auto;
}

@media(max-width:700px){

  .search input{
    width:90px;
  }

}

</style>
</head>
<body>

<header>

  <div class="logo">
    Horizen<span>News</span>
  </div>

  <div class="header-right">

    <div class="search">
      <i class="fas fa-search"></i>
      <input id="searchInput" placeholder="Filter..." oninput="filterNews(this.value)">
    </div>

    <button class="refresh-btn" onclick="loadFeed()">
      <i class="fas fa-rotate-right"></i>
    </button>

  </div>

</header>

<div class="tabs-wrap">

  <div class="tabs" id="tabs"></div>

</div>

<div class="container" id="content">

  <div class="loader">
    Loading...
  </div>

</div>

<div id="overlay" onclick="overlayClick(event)">

  <div id="player">

    <div id="player-top">

      <div id="player-source"></div>

      <button id="close" onclick="closePlayer()">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="video-wrap">

      <iframe
        id="video"
        allowfullscreen
        allow="autoplay">
      </iframe>

    </div>

    <div class="player-body">

      <div id="player-title"></div>

      <div id="player-meta"></div>

      <div id="player-desc"></div>

    </div>

  </div>

</div>

<script>

const RSS='https://api.rss2json.com/v1/api.json?rss_url=';

const FEEDS=[

{
  label:'📺 NBC',
  source:'NBC News',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCeY0bbntWzzVIaj2z3QigXg'
},

{
  label:'📺 ABC',
  source:'ABC News',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCBi2mrWuNuyYy4gbM6fU18Q'
},

{
  label:'📺 CBS',
  source:'CBS News',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UC8p1vwvWtl6T73JiExfWs1g'
},

{
  label:'📺 BBC',
  source:'BBC News',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UC16niRr50-MSBwiO3YDb3Q'
},

{
  label:'📺 Sky',
  source:'Sky News',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCoMdktPbSTixAyNGwb-UYkQ'
},

{
  label:'⚽ ESPN',
  source:'ESPN FC',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCooTLkxcpnTNx6vfOovfBFA'
},

{
  label:'🤖 AI',
  source:'Fireship',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCsBjURrPoezykLs9EqgamOA'
},

{
  label:'🍎 Apple',
  source:'Apple',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCE_M8A5yxnLfW0KghEeajjw'
},

{
  label:'🖥️ Linus',
  source:'Linus Tech Tips',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCXuqSBlHAE6Xw-yeJA0Tunw'
},

{
  label:'🚀 NASA',
  source:'NASA',
  url:'https://www.youtube.com/feeds/videos.xml?channel_id=UCLA_DiR1FfKNvjuUpBHmylQ'
}

];

let currentFeed=0;
let allVideos=[];

buildTabs();
loadFeed();

function buildTabs(){

  document.getElementById('tabs').innerHTML=
  FEEDS.map((f,i)=>`

    <div
      class="tab ${i===0?'active':''}"
      onclick="switchFeed(${i},this)">

      ${f.label}

    </div>

  `).join('');

}

function switchFeed(index,el){

  currentFeed=index;

  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
  });

  el.classList.add('active');

  loadFeed();

}

async function loadFeed(){

  document.getElementById('content').innerHTML=`
    <div class="loader">
      Loading videos...
    </div>
  `;

  try{

    const feed=FEEDS[currentFeed];

    const res=await fetch(
      RSS + encodeURIComponent(feed.url)
    );

    const data=await res.json();

    allVideos=(data.items||[]).map(item=>{

      const videoId=
      getVideoId(item.link||'') ||
      getVideoId(item.guid||'');

      return{

        title:item.title||'',
        description:strip(item.description||''),
        source:feed.source,
        videoId:videoId,
        image:`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
        date:item.pubDate||''

      };

    }).filter(v=>v.videoId);

    renderVideos(allVideos);

  }catch(err){

    document.getElementById('content').innerHTML=`
      <div class="loader">
        Failed loading feed.
      </div>
    `;

  }

}

function renderVideos(videos){

  if(!videos.length){

    document.getElementById('content').innerHTML=`
      <div class="loader">
        No videos found.
      </div>
    `;

    return;

  }

  let html=`<div class="news-grid">`;

  videos.forEach((v,i)=>{

    html+=`

    <div class="card" onclick="openVideo(${i})">

      <div class="thumb">

        <img
          src="${v.image}"
          onerror="this.src='https://i.imgur.com/L7j6AKH.png'">

        <div class="play-overlay">

          <div class="play-circle">
            <i class="fas fa-play"></i>
          </div>

        </div>

        <div class="badge">
          ▶ VIDEO
        </div>

      </div>

      <div class="card-body">

        <div class="source">
          ${v.source}
        </div>

        <div class="title">
          ${escapeHtml(v.title)}
        </div>

        <div class="meta">
          ${timeAgo(v.date)}
        </div>

      </div>

    </div>

    `;

  });

  html+=`</div>`;

  document.getElementById('content').innerHTML=html;

}

function filterNews(query){

  query=query.toLowerCase();

  renderVideos(

    allVideos.filter(v=>

      v.title.toLowerCase().includes(query)

    )

  );

}

function openVideo(index){

  const v=allVideos[index];

  if(!v) return;

  document.getElementById('player-source').innerText=v.source;

  document.getElementById('player-title').innerText=v.title;

  document.getElementById('player-meta').innerText=timeAgo(v.date);

  document.getElementById('player-desc').innerText=v.description;

  document.getElementById('video').src=
  `https://www.youtube.com/embed/${v.videoId}?autoplay=1`;

  document.getElementById('overlay').classList.add('show');

  document.body.style.overflow='hidden';

}

function closePlayer(){

  document.getElementById('overlay').classList.remove('show');

  document.getElementById('video').src='';

  document.body.style.overflow='';

}

function overlayClick(e){

  if(e.target.id==='overlay'){
    closePlayer();
  }

}

document.addEventListener('keydown',e=>{

  if(e.key==='Escape'){
    closePlayer();
  }

});

function getVideoId(str){

  if(!str) return null;

  const m=str.match(
    /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
  );

  return m?m[1]:null;

}

function strip(html){

  const div=document.createElement('div');

  div.innerHTML=html;

  return div.textContent||'';

}

function timeAgo(date){

  if(!date) return '';

  const diff=Date.now()-new Date(date).getTime();

  const mins=Math.floor(diff/60000);

  if(mins<60) return mins+'m ago';

  const hrs=Math.floor(mins/60);

  if(hrs<24) return hrs+'h ago';

  return Math.floor(hrs/24)+'d ago';

}

function escapeHtml(str){

  return String(str)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

}

</script>
</body>
</html>
